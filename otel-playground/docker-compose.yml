services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - es-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      - elasticsearch

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.17.0
    container_name: apm-server
    command: >
      apm-server -e
        -E apm-server.host=0.0.0.0:8200
        -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
    ports:
      - '8200:8200'     # OTLP HTTP/gRPC receiver
    depends_on:
      - elasticsearch

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: otel-collector
    command: ['--config=/etc/otelcol/config.yml']
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/config.yml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
    depends_on:
      - apm-server

  postgres:
    image: postgres:17
    container_name: otel-postgres
    environment:
      POSTGRES_USER: otel
      POSTGRES_PASSWORD: otel
      POSTGRES_DB: otel_playground
    ports:
      - '54320:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: otel-redis
    ports:
      - '63790:6379'
    volumes:
      - redis-data:/data

volumes:
  es-data:
  pg-data:
  redis-data:
