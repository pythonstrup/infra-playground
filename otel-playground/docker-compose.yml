services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:5601/api/status || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20

  apm-server:
    image: docker.elastic.co/apm/apm-server:${STACK_VERSION}
    container_name: apm-server
    command: >
      apm-server -e
        -E apm-server.host=0.0.0.0:8200
        -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
    ports:
      - '8200:8200'     # OTLP HTTP/gRPC receiver
    depends_on:
      - elasticsearch

  fluent-bit:
    image: fluent/fluent-bit:${FLUENT_BIT_VERSION}
    container_name: fluent-bit
    volumes:
      - ./infra/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./infra/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - fluent-bit-db:/fluent-bit/db
      - fluent-bit-storage:/fluent-bit/db/storage
      - pg-data:/pg-data:ro
      - redis-data:/redis-data:ro
    depends_on:
      otel-collector:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION}
    container_name: otel-collector
    command: ['--config=/etc/otelcol/config.yml']
    environment:
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-development}
      DATABASE_USER: ${DATABASE_USER:-otel}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-otel}
      DATABASE_NAME: ${DATABASE_NAME:-otel_playground}
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/config.yml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
    depends_on:
      apm-server:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: otel-postgres
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: ${DATABASE_USER:-otel}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-otel}
      POSTGRES_DB: ${DATABASE_NAME:-otel_playground}
    ports:
      - '54320:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infra/postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:${REDIS_VERSION}
    container_name: otel-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - '63790:6379'
    volumes:
      - redis-data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro

  gateway:
    build:
      context: .
      args:
        APP_NAME: gateway
    container_name: gateway
    labels:
      log_collect: 'true'
    logging:
      driver: json-file
      options:
        labels: log_collect
    environment:
      NODE_ENV: production
      USER_SERVICE_URL: http://user-service:3001
      ORDER_SERVICE_URL: http://order-service:3002
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '3000:3000'
    restart: unless-stopped
    depends_on:
      - otel-collector

  user-service:
    build:
      context: .
      args:
        APP_NAME: user-service
    container_name: user-service
    labels:
      log_collect: 'true'
    logging:
      driver: json-file
      options:
        labels: log_collect
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: '5432'
      DATABASE_USER: ${DATABASE_USER:-otel}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-otel}
      DATABASE_NAME: ${DATABASE_NAME:-otel_playground}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '3001:3001'
    restart: unless-stopped
    depends_on:
      - otel-collector
      - postgres
      - redis

  order-service:
    build:
      context: .
      args:
        APP_NAME: order-service
    container_name: order-service
    labels:
      log_collect: 'true'
    logging:
      driver: json-file
      options:
        labels: log_collect
    environment:
      NODE_ENV: production
      USER_SERVICE_URL: http://user-service:3001
      DATABASE_HOST: postgres
      DATABASE_PORT: '5432'
      DATABASE_USER: ${DATABASE_USER:-otel}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-otel}
      DATABASE_NAME: ${DATABASE_NAME:-otel_playground}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '3002:3002'
    restart: unless-stopped
    depends_on:
      - otel-collector
      - postgres
      - redis

  notification-service:
    build:
      context: .
      args:
        APP_NAME: notification-service
    container_name: notification-service
    labels:
      log_collect: 'true'
    logging:
      driver: json-file
      options:
        labels: log_collect
    environment:
      NODE_ENV: production
      USER_SERVICE_URL: http://user-service:3001
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '3003:3003'
    restart: unless-stopped
    depends_on:
      - otel-collector
      - redis

volumes:
  es-data:
  pg-data:
  redis-data:
  fluent-bit-db:
  fluent-bit-storage:
