services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:5601/api/status || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20

  apm-server:
    image: docker.elastic.co/apm/apm-server:${STACK_VERSION}
    container_name: apm-server
    command: >
      apm-server -e
        -E apm-server.host=0.0.0.0:8200
        -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
    ports:
      - '8200:8200'     # OTLP HTTP/gRPC receiver
    depends_on:
      - elasticsearch

  fluent-bit:
    image: fluent/fluent-bit:${FLUENT_BIT_VERSION}
    container_name: fluent-bit
    volumes:
      - ./infra/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
    ports:
      - '24224:24224'
    depends_on:
      elasticsearch:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION}
    container_name: otel-collector
    command: ['--config=/etc/otelcol/config.yml']
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/config.yml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
    depends_on:
      - apm-server

  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: otel-postgres
    environment:
      POSTGRES_USER: otel
      POSTGRES_PASSWORD: otel
      POSTGRES_DB: otel_playground
    ports:
      - '54320:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:${REDIS_VERSION}
    container_name: otel-redis
    ports:
      - '63790:6379'
    volumes:
      - redis-data:/data

volumes:
  es-data:
  pg-data:
  redis-data:
