# ============================================================
# PostgreSQL Configuration (otel-playground)
# Only override settings that differ from defaults.
# ============================================================

# --- Connection ---
listen_addresses = '*'
max_connections  = 100

# --- Memory ---
shared_buffers          = 128MB
dynamic_shared_memory_type = posix

# --- Extensions ---
shared_preload_libraries = 'pg_stat_statements'
compute_query_id         = auto
pg_stat_statements.max   = 10000
pg_stat_statements.track = all

# --- Logging: JSON structured logs (PG 15+) ---
logging_collector       = on
log_destination         = 'jsonlog'
log_directory           = 'log'
log_filename            = 'postgresql'
log_rotation_age        = 1d
log_rotation_size       = 50MB
log_truncate_on_rotation = on

# What to log
log_statement            = 'mod'           # none | ddl | mod | all
log_min_duration_statement = 200           # ms; log slow queries (>=200ms)
log_connections          = on
log_disconnections       = on
log_lock_waits           = on
log_checkpoints          = on
log_temp_files           = 0               # log all temp file usage
log_line_prefix          = '%m [%p] %q%u@%d '
