[SERVICE]
    flush                     1
    log_level                 info
    parsers_file              parsers.conf
    storage.path              /fluent-bit/db/storage
    storage.sync              normal
    storage.checksum          off
    storage.max_chunks_up     128
    storage.backlog.mem_limit 5M

[INPUT]
    name              tail
    path              /var/lib/docker/containers/*/*-json.log
    tag               app.docker
    parser            docker
    db                /fluent-bit/db/tail.db
    storage.type              filesystem
    storage.total_limit_size  200M

# 앱 컨테이너만 통과 (label log_collect=true)
[FILTER]
    name    grep
    match   app.*
    regex   $attrs['log_collect'] true

# Winston JSON 파싱
[FILTER]
    name         parser
    match        app.*
    key_name     log
    parser       app_json
    reserve_data off

[OUTPUT]
    name                    es
    match                   app.*
    host                    elasticsearch
    port                    9200
    index                   logs-app-default
    suppress_type_name      on
    generate_id             on
    trace_error             on
    storage.total_limit_size 50M
