[SERVICE]
    flush        1
    log_level    info
    parsers_file parsers.conf

[INPUT]
    name         http
    listen       0.0.0.0
    port         24224
    tag          app.logs

[OUTPUT]
    name            es
    match           *
    host            elasticsearch
    port            9200
    index           logs-app-default
    suppress_type_name on
    generate_id     on
    trace_error     on
