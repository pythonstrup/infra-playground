[PARSER]
    name        docker
    format      json
    time_key    time
    time_format %Y-%m-%dT%H:%M:%S.%LZ

[PARSER]
    name        app_json
    format      json
    time_key    @timestamp
    time_format %Y-%m-%dT%H:%M:%S.%LZ

[PARSER]
    name        pg_json
    format      json
    time_key    timestamp
    time_format %Y-%m-%d %H:%M:%S.%L %Z

[PARSER]
    name        redis_log
    format      regex
    regex       ^(?<pid>\d+):(?<role>[A-Z]) (?<timestamp>\d{2} \w{3} \d{4} \d{2}:\d{2}:\d{2}\.\d{3}) (?<level>[.*#\-]) (?<message>.*)$
    time_key    timestamp
    time_format %d %b %Y %H:%M:%S.%L
