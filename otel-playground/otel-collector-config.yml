receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  fluentforward:
    endpoint: 0.0.0.0:8006
  fluentforward/postgres:
    endpoint: 0.0.0.0:8007
  fluentforward/redis:
    endpoint: 0.0.0.0:8008
  postgresql:
    endpoint: postgres:5432
    transport: tcp
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    databases:
      - ${DATABASE_NAME}
    collection_interval: 30s
    tls:
      insecure: true
  redis:
    endpoint: redis:6379
    collection_interval: 30s

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 15
  batch:
    send_batch_size: 512
    timeout: 5s
  resource/logs:
    attributes:
      - key: deployment.environment
        value: "${DEPLOYMENT_ENVIRONMENT}"
        action: upsert
  attributes/logs:
    actions:
      - key: fluent.tag
        action: delete
  resource/postgres:
    attributes:
      - key: service.name
        value: postgresql
        action: upsert
      - key: deployment.environment
        value: "${DEPLOYMENT_ENVIRONMENT}"
        action: upsert
  resource/redis:
    attributes:
      - key: service.name
        value: redis
        action: upsert
      - key: deployment.environment
        value: "${DEPLOYMENT_ENVIRONMENT}"
        action: upsert
  attributes/db:
    actions:
      - key: fluent.tag
        action: delete

exporters:
  otlphttp:
    endpoint: http://apm-server:8200
  debug:
    verbosity: basic
  elasticsearch:
    endpoints: [http://elasticsearch:9200]
    logs_index: logs-app-default
    mapping:
      mode: ecs
    flush:
      bytes: 5242880
      interval: 5s
  elasticsearch/postgres:
    endpoints: [http://elasticsearch:9200]
    logs_index: logs-postgres-default
    mapping:
      mode: ecs
    flush:
      bytes: 5242880
      interval: 5s
  elasticsearch/redis:
    endpoints: [http://elasticsearch:9200]
    logs_index: logs-redis-default
    mapping:
      mode: ecs
    flush:
      bytes: 5242880
      interval: 5s

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp, debug]
    logs:
      receivers: [fluentforward]
      processors: [memory_limiter, resource/logs, attributes/logs, batch]
      exporters: [elasticsearch]
    logs/postgres:
      receivers: [fluentforward/postgres]
      processors: [memory_limiter, resource/postgres, attributes/db, batch]
      exporters: [elasticsearch/postgres]
    logs/redis:
      receivers: [fluentforward/redis]
      processors: [memory_limiter, resource/redis, attributes/db, batch]
      exporters: [elasticsearch/redis]
    metrics/postgres:
      receivers: [postgresql]
      processors: [memory_limiter, resource/postgres, batch]
      exporters: [otlphttp, debug]
    metrics/redis:
      receivers: [redis]
      processors: [memory_limiter, resource/redis, batch]
      exporters: [otlphttp, debug]
